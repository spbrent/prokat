<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Тест прокси для проката</title>
</head>
<body>
  <h1>Тест подключения к данным проката</h1>
  <pre id="output">Загрузка данных...</pre>

  <script>
    // ⚠️ ВАЖНО: Замените этот URL на URL вашего веб-приложения из Apps Script
    const SCRIPT_URL = 'https://n90942i5.beget.tech/index.php';

    async function testConnection() {
      const outputDiv = document.getElementById('output');
      outputDiv.textContent = 'Отправка запроса к прокси...';

      try {
        // Простой fetch запрос к вашему скрипту
        const response = await fetch(SCRIPT_URL);

        if (!response.ok) {
          throw new Error(`Ошибка HTTP: ${response.status} ${response.statusText}`);
        }

        const data = await response.json();
        outputDiv.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        outputDiv.textContent = `Ошибка подключения: ${error.message}`;
      }
    }

    // Запускаем тест после загрузки страницы
    window.onload = testConnection;
  </script>
</body>
</html>
