<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Тест скрипта</title>
</head>
<body>
  <h3>Результат:</h3>
  <pre id="result">Загрузка...</pre>
  <script>
    // Сюда вставьте URL вашего скрипта
    const SCRIPT_URL = 'https://script.google.com/macros/s/.../exec';
    fetch(SCRIPT_URL)
      .then(response => response.json())
      .then(data => {
        document.getElementById('result').innerText = JSON.stringify(data, null, 2);
      })
      .catch(error => {
        document.getElementById('result').innerText = 'Ошибка: ' + error;
      });
  </script>
</body>
</html>
