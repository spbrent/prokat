<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Прокат инструмента | ЭЛЕКТРОСЕРВИС</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0f4f8; font-family: 'Segoe UI', system-ui, 'Roboto', sans-serif; color: #1a202c; line-height: 1.5; }
    
    .site-header { 
      background: #2d3748; 
      color: #fff; 
      padding: 10px 0; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.15); 
      position: sticky; 
      top: 0; 
      z-index: 100; 
      transition: background 0.3s ease, box-shadow 0.3s ease; 
    }
    .site-header.scrolled { background: rgba(45, 55, 72, 0.95); backdrop-filter: blur(10px); }
    
    .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
    .header-inner { 
      display: flex; 
      flex-wrap: wrap; 
      align-items: center; 
      gap: 12px 20px; 
    }
    
    .logo { flex-shrink: 0; }
    .logo a { 
      color: #fff; 
      font-size: 1rem; 
      font-weight: 700; 
      text-transform: uppercase; 
      letter-spacing: 1px; 
      text-decoration: none; 
      transition: opacity 0.2s; 
    }
    .logo a:hover { opacity: 0.85; }
    
    .refresh-btn { 
      background: none; 
      border: none; 
      color: #a0aec0; 
      padding: 2px 6px; 
      cursor: pointer; 
      font-size: 0.8rem; 
      font-weight: 500; 
      display: flex; 
      align-items: center; 
      gap: 4px; 
      transition: all 0.2s; 
      font-family: inherit; 
      border-radius: 4px;
    }
    .refresh-btn:hover { 
      color: #fff; 
      background: rgba(255,255,255,0.1); 
    }
    .refresh-btn.loading { opacity: 0.6; cursor: wait; }
    .refresh-btn .spinner { 
      display: none; 
      width: 12px; 
      height: 12px; 
      border: 1.5px solid rgba(160,174,192,0.4); 
      border-top-color: #a0aec0; 
      border-radius: 50%; 
      animation: spin 0.8s linear infinite; 
    }
    .refresh-btn:hover .spinner { border-top-color: #fff; }
    .refresh-btn.loading .spinner { display: inline-block; border-top-color: #fff; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .address { 
      color: #cbd5e0; 
      font-size: 0.75rem; 
      white-space: nowrap; 
    }
    
    .contact-block { 
      display: flex; 
      flex-direction: column; 
      align-items: flex-end; 
      gap: 2px; 
      margin-left: auto; /* Прижимает контакты к правому краю для баланса */
    }
    .contact-block a { 
      color: #fff; 
      text-decoration: none; 
      font-weight: 600; 
      font-size: 0.9rem; 
    }
    .contact-block .small { 
      font-size: 0.7rem; 
      color: #a0aec0; 
    }
    
    .toolbar { margin: 25px 0 20px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 15px; }
    .search-box { flex: 2; min-width: 200px; }
    .search-box input { width: 100%; padding: 10px 16px; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; color: #1a202c; font-size: 0.95rem; }
    .search-box input:focus { outline: none; border-color: #3182ce; box-shadow: 0 0 0 3px rgba(49,130,206,0.1); }
    .filter-buttons { display: flex; gap: 10px; }
    .filter-btn { background: #fff; border: 1px solid #e2e8f0; padding: 8px 16px; border-radius: 8px; color: #4a5568; font-weight: 500; cursor: pointer; transition: 0.2s; }
    .filter-btn.active { background: #3182ce; border-color: #3182ce; color: #fff; }
    .filter-btn:hover { border-color: #3182ce; color: #3182ce; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-bottom: 40px; align-items: stretch; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 18px; display: flex; flex-direction: column; transition: all 0.2s ease; min-height: 440px; position: relative; }
    .card:hover { box-shadow: 0 10px 24px rgba(0,0,0,0.08); transform: translateY(-2px); }
    .card-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; }
    .code { font-size: 0.7rem; background: #edf2f7; padding: 3px 8px; border-radius: 20px; color: #4a5568; font-family: monospace; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; flex-shrink: 1; min-width: 0; }
    .status { font-size: 0.65rem; font-weight: 700; padding: 3px 10px; border-radius: 30px; text-transform: uppercase; white-space: nowrap; flex-shrink: 0; }
    .status.free { background: #c6f6d5; color: #22543d; }
    .status.busy { background: #fed7d7; color: #742a2a; }
    .card-title { font-size: 1rem; font-weight: 700; margin: 0 0 14px 0; line-height: 1.4; color: #1a202c; word-break: break-word; cursor: pointer; background: #f0f9ff; padding: 4px 8px; border-radius: 8px; transition: background 0.2s; display: inline-block; width: auto; position: relative; z-index: 2; }
    .card-title:hover { background: #dbeafe; }
    .card-popup { position: absolute; left: 0; right: 0; background: white; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.15); padding: 12px; z-index: 20; display: none; opacity: 0; transition: opacity 0.2s ease; pointer-events: auto; margin: 0 20px; width: calc(100% - 40px); }
    .card-popup img { width: 100%; max-height: 160px; object-fit: contain; border-radius: 8px; margin-bottom: 10px; }
    .card-popup .popup-title { font-weight: 700; font-size: 0.85rem; margin-bottom: 8px; text-align: center; }
    .card-popup .popup-search { text-align: center; margin-top: 8px; }
    .search-link { background: #3182ce; color: white; padding: 5px 12px; border-radius: 20px; text-decoration: none; font-size: 0.7rem; font-weight: 600; cursor: pointer; display: inline-block; }
    .search-link:hover { background: #2c5282; }
    .card-popup .no-image-text { text-align: center; color: #718096; padding: 20px 0; }
    .details { background: #f7fafc; border-radius: 12px; padding: 12px 14px; margin-bottom: 18px; position: relative; z-index: 1; }
    .detail-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; gap: 12px; flex-wrap: wrap; }
    .price { font-size: 1.3rem; font-weight: 800; color: #2b6cb0; }
    .deposit { font-weight: 600; color: #2d3748; }
    .card-footer { margin-top: auto; display: flex; flex-direction: column; position: relative; z-index: 1; }
    .btn-group { display: flex; gap: 10px; }
    .btn { flex: 1; text-align: center; padding: 10px 8px; border-radius: 8px; font-weight: 600; text-decoration: none; font-size: 0.85rem; white-space: nowrap; }
    .btn-primary { background: #3182ce; color: #fff; }
    .btn-outline { border: 1px solid #cbd5e0; color: #4a5568; background: #fff; }
    .busy-info { background: #fed7d7; border-left: 4px solid #e53e3e; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 8px; color: #742a2a; font-weight: 500; min-height: 48px; }
    .card.free-card .busy-info { display: none; }
    .card.busy-card .btn-group { display: none; }
    .site-footer { background: #2d3748; color: #a0aec0; padding: 25px 0; text-align: center; font-size: 0.8rem; margin-top: 30px; }
    .loader, .error-msg { text-align: center; padding: 20px; }
    .retry-btn { background: #3182ce; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 12px; }
    .retry-btn:hover { background: #2c5282; }
    
    @media (max-width: 680px) {
      .header-inner { flex-direction: column; align-items: center; text-align: center; gap: 8px; }
      .contact-block { align-items: center; margin-left: 0; }
      .address, .logo a { white-space: normal; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .filter-buttons { width: 100%; justify-content: center; }
      .btn { white-space: normal; }
      .card-popup { margin: 0 10px; width: calc(100% - 20px); }
      .card-popup img { max-height: 120px; }
    }
  </style>
</head>
<body>

<header class="site-header" id="siteHeader">
  <div class="container header-inner">
    <div class="logo">
      <a href="https://elektroremspb.ru/" target="_blank" rel="noopener noreferrer">ЭЛЕКТРОСЕРВИС</a>
    </div>
    <button class="refresh-btn" id="refreshBtn">
      <span class="spinner"></span> Обновить
    </button>
    <div class="address">📍 г. Санкт-Петербург, ул. Руставели, 13, БЦ Ручьи, пом. 206</div>
    <div class="contact-block">
      <a href="tel:+79013006670">📞 +7 (901) 300-66-70</a>
      <div class="small">ежедневно с 10:00 до 20:00</div>
    </div>
  </div>
</header>

<div class="container">
  <div class="toolbar">
    <div class="search-box"><input type="text" id="searchInput" placeholder="Поиск по названию или артикулу..."></div>
    <div class="filter-buttons">
      <button class="filter-btn active" data-filter="all">Все инструменты</button>
      <button class="filter-btn" data-filter="free">Только свободные</button>
    </div>
  </div>
  <div id="errorMsg"></div>
  <div id="catalogGrid" class="grid"><div class="loader">Загрузка каталога...</div></div>
</div>

<footer class="site-footer">© 2025 ЭЛЕКТРОСЕРВИС — ремонт и прокат инструмента в Санкт-Петербурге</footer>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzDzqjjSCxW8iyjYBiP3KfRE64N24YWot6Qo67ykO6WP-ez8HIqRgqZAvoqMwd-p5k/exec';
  const PHONE_MAIN = '+79013006670';
  const PHONE_ALT = '+79817239331';

  let allTools = [];
  let currentFilter = 'all';
  let searchQuery = '';
  let toolsMap = new Map();

  const gridContainer = document.getElementById('catalogGrid');
  const searchInput = document.getElementById('searchInput');
  const errorDiv = document.getElementById('errorMsg');
  const filterBtns = document.querySelectorAll('.filter-btn');
  const refreshBtn = document.getElementById('refreshBtn');

  function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;')
      .replace(/\\/g, '&#92;');
  }

  function setTextContent(element, text) {
    element.textContent = text;
  }

  window.searchYandex = function(query) {
    window.open(`https://yandex.ru/search/?text=${encodeURIComponent(query)}`, '_blank');
  };

  function getImagePathFromModel(modelName) {
    if (!modelName || modelName === '—') return null;
    let safe = modelName.toLowerCase()
      .replace(/[^a-zа-яё0-9]/g, '-')
      .replace(/-+/g, '-')
      .replace(/^-|-$/g, '');
    if (!safe) return null;
    return `images/${safe}.jpg`;
  }

  function attachPopupHandlers(card, tool, cardId) {
    const titleElem = card.querySelector('.card-title');
    if (!titleElem) return;
    
    let popup = card.querySelector('.card-popup');
    if (!popup) {
      popup = document.createElement('div');
      popup.className = 'card-popup';
      popup.setAttribute('role', 'dialog');
      popup.setAttribute('aria-hidden', 'true');
      card.appendChild(popup);
    }

    let showTimeout = null, hideTimeout = null, isVisible = false;

    function fillPopup() {
      const modelName = tool['Название - №'] || '';
      const imgPath = getImagePathFromModel(modelName);
      const nameForSearch = modelName || tool['Код'] || 'Инструмент';
      
      popup.innerHTML = '';
      const contentDiv = document.createElement('div');
      contentDiv.style.textAlign = 'center';
      
      if (imgPath) {
        const img = document.createElement('img');
        img.src = imgPath;
        img.style.width = '100%';
        img.style.maxHeight = '160px';
        img.style.objectFit = 'contain';
        img.style.borderRadius = '8px';
        img.style.marginBottom = '10px';
        img.alt = escapeHtml(modelName);
        img.onerror = function() {
          this.style.display = 'none';
          const fallback = document.createElement('div');
          fallback.className = 'fallback';
          fallback.style.display = 'block';
          fallback.style.padding = '10px';
          fallback.textContent = '📷 Фото отсутствует';
          this.parentElement.appendChild(fallback);
        };
        contentDiv.appendChild(img);
      } else {
        const noImg = document.createElement('div');
        noImg.className = 'no-image-text';
        noImg.textContent = '📷 Нет фото';
        contentDiv.appendChild(noImg);
      }
      
      const popupTitle = document.createElement('div');
      popupTitle.className = 'popup-title';
      setTextContent(popupTitle, modelName);
      contentDiv.appendChild(popupTitle);
      
      const searchDiv = document.createElement('div');
      searchDiv.className = 'popup-search';
      const searchLink = document.createElement('a');
      searchLink.className = 'search-link';
      searchLink.href = '#';
      searchLink.textContent = '🔍 Поискать в Яндексе';
      searchLink.addEventListener('click', (e) => {
        e.preventDefault();
        searchYandex(nameForSearch);
      });
      searchDiv.appendChild(searchLink);
      contentDiv.appendChild(searchDiv);
      
      popup.appendChild(contentDiv);
      positionPopup(card, popup, titleElem);
    }

    function positionPopup(card, popup, titleElem) {
      const cardRect = card.getBoundingClientRect();
      const titleRect = titleElem.getBoundingClientRect();
      let top = titleRect.bottom - cardRect.top + 8;
      const maxTop = card.clientHeight - popup.offsetHeight - 10;
      if (top > maxTop) top = maxTop;
      if (top < 0) top = 0;
      popup.style.top = top + 'px';
    }

    function scheduleShow() {
      if (hideTimeout) clearTimeout(hideTimeout);
      if (showTimeout) clearTimeout(showTimeout);
      showTimeout = setTimeout(() => {
        if (!isVisible) {
          fillPopup();
          popup.style.display = 'block';
          popup.setAttribute('aria-hidden', 'false');
          setTimeout(() => popup.style.opacity = '1', 5);
          isVisible = true;
        }
        showTimeout = null;
      }, 150);
    }

    function cancelShow() { if (showTimeout) clearTimeout(showTimeout); }
    function scheduleHide() {
      if (hideTimeout) clearTimeout(hideTimeout);
      hideTimeout = setTimeout(() => {
        popup.style.opacity = '0';
        popup.setAttribute('aria-hidden', 'true');
        setTimeout(() => { popup.style.display = 'none'; isVisible = false; }, 200);
        hideTimeout = null;
      }, 300);
    }

    titleElem.addEventListener('mouseenter', scheduleShow);
    titleElem.addEventListener('mouseleave', () => { cancelShow(); if (isVisible) scheduleHide(); });
    popup.addEventListener('mouseenter', () => { if (hideTimeout) clearTimeout(hideTimeout); });
    popup.addEventListener('mouseleave', () => { if (isVisible) scheduleHide(); });
    window.addEventListener('resize', () => {
      if (popup.style.display === 'block') positionPopup(card, popup, titleElem);
    });
  }

  function renderTools(toolsArray) {
    if (!toolsArray.length) {
      gridContainer.innerHTML = '<div class="loader">Ничего не найдено</div>';
      return;
    }
    
    const fragment = document.createDocumentFragment();
    
    toolsArray.forEach(tool => {
      const cardId = 'card_' + Math.random().toString(36).substr(2, 9);
      toolsMap.set(cardId, tool);
      
      const isFree = tool.isFree;
      const code = tool['Код'] || '—';
      const name = tool['Название - №'] || 'Инструмент';
      const price = tool['Цена сутки'] ? `${tool['Цена сутки']} ₽` : '—';
      const deposit = tool['Залог'] ? `${tool['Залог']} ₽` : '—';
      const statusClass = isFree ? 'free' : 'busy';
      const statusText = isFree ? '● Свободен' : '● Занят';
      const cardTypeClass = isFree ? 'free-card' : 'busy-card';
      
      const card = document.createElement('div');
      card.className = `card ${cardTypeClass}`;
      card.dataset.cardId = cardId;
      
      const header = document.createElement('div');
      header.className = 'card-header';
      
      const codeSpan = document.createElement('span');
      codeSpan.className = 'code';
      codeSpan.title = escapeHtml(code);
      setTextContent(codeSpan, code);
      
      const statusSpan = document.createElement('span');
      statusSpan.className = `status ${statusClass}`;
      setTextContent(statusSpan, statusText);
      
      header.appendChild(codeSpan);
      header.appendChild(statusSpan);
      card.appendChild(header);
      
      const title = document.createElement('div');
      title.className = 'card-title';
      setTextContent(title, name);
      card.appendChild(title);
      
      const details = document.createElement('div');
      details.className = 'details';
      
      const row1 = document.createElement('div');
      row1.className = 'detail-row';
      const label1 = document.createElement('span');
      label1.className = 'label';
      setTextContent(label1, 'Аренда / сутки');
      const priceSpan = document.createElement('span');
      priceSpan.className = 'price';
      setTextContent(priceSpan, price);
      row1.appendChild(label1);
      row1.appendChild(priceSpan);
      
      const row2 = document.createElement('div');
      row2.className = 'detail-row';
      const label2 = document.createElement('span');
      label2.className = 'label';
      setTextContent(label2, 'Залог');
      const depositSpan = document.createElement('span');
      depositSpan.className = 'deposit';
      setTextContent(depositSpan, deposit);
      row2.appendChild(label2);
      row2.appendChild(depositSpan);
      
      details.appendChild(row1);
      details.appendChild(row2);
      card.appendChild(details);
      
      const footer = document.createElement('div');
      footer.className = 'card-footer';
      
      const btnGroup = document.createElement('div');
      btnGroup.className = 'btn-group';
      
      const btn1 = document.createElement('a');
      btn1.href = `tel:${PHONE_MAIN}`;
      btn1.className = 'btn btn-primary';
      setTextContent(btn1, '📞 Позвонить');
      
      const btn2 = document.createElement('a');
      btn2.href = `tel:${PHONE_ALT}`;
      btn2.className = 'btn btn-outline';
      setTextContent(btn2, 'Второй номер');
      
      btnGroup.appendChild(btn1);
      btnGroup.appendChild(btn2);
      footer.appendChild(btnGroup);
      
      if (!isFree) {
        const returnDate = tool['Дата - до'] || tool['Дата'] || tool['Возврат'] || 'дата уточняется';
        const busyInfo = document.createElement('div');
        busyInfo.className = 'busy-info';
        busyInfo.innerHTML = `⏳ Занято до: <strong>${escapeHtml(returnDate)}</strong>`;
        footer.appendChild(busyInfo);
      }
      
      card.appendChild(footer);
      fragment.appendChild(card);
      attachPopupHandlers(card, tool, cardId);
    });
    
    gridContainer.innerHTML = '';
    gridContainer.appendChild(fragment);
  }

  function applyFiltersAndSearch() {
    let filtered = [...allTools];
    if (currentFilter === 'free') filtered = filtered.filter(t => t.isFree);
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(t => 
        (t['Название - №'] || '').toLowerCase().includes(q) ||
        (t['Код'] || '').toLowerCase().includes(q)
      );
    }
    renderTools(filtered);
  }

  function setLoadingState(loading) {
    if (loading) {
      refreshBtn.classList.add('loading');
      refreshBtn.disabled = true;
    } else {
      refreshBtn.classList.remove('loading');
      refreshBtn.disabled = false;
    }
  }

  function loadData(showLoader = true) {
    if (showLoader) {
      gridContainer.innerHTML = '<div class="loader">Загрузка каталога...</div>';
      setLoadingState(true);
    }
    errorDiv.innerHTML = '';

    const scriptId = 'jsonp_callback_' + Date.now();
    
    window[scriptId] = function(response) {
      delete window[scriptId];
      const script = document.getElementById(scriptId + '_script');
      if (script) document.body.removeChild(script);
      setLoadingState(false);
      
      try {
        if (!response || typeof response !== 'object') throw new Error('Некорректный формат ответа');
        if (!response.success) throw new Error(response.error || 'Ошибка получения данных');
        
        let rows = response.data;
        if (!Array.isArray(rows)) throw new Error('Данные должны быть массивом');
        if (rows.length === 0) throw new Error('Таблица пуста');

        const validStatuses = ['свободен', 'занят'];
        rows = rows.filter(row => validStatuses.includes((row['Статус'] || '').toString().toLowerCase().trim()));
        if (rows.length === 0) throw new Error('Нет инструментов с корректным статусом');

        allTools = rows.map(row => ({
          ...row,
          isFree: (row['Статус'] || '').toString().toLowerCase().trim() === 'свободен'
        }));
        allTools.sort((a, b) => b.isFree - a.isFree);
        applyFiltersAndSearch();
      } catch (err) {
        console.error(err);
        const retryBtn = document.createElement('button');
        retryBtn.className = 'retry-btn';
        retryBtn.textContent = '🔄 Повторить попытку';
        retryBtn.addEventListener('click', () => loadData());
        errorDiv.innerHTML = `<div class="error-msg">⚠️ Ошибка: ${escapeHtml(err.message)}</div>`;
        errorDiv.appendChild(retryBtn);
        gridContainer.innerHTML = '';
      }
    };

    const script = document.createElement('script');
    script.id = scriptId + '_script';
    script.src = `${SCRIPT_URL}?callback=${scriptId}&t=${Date.now()}`;
    script.onerror = () => {
      setLoadingState(false);
      delete window[scriptId];
      errorDiv.innerHTML = `<div class="error-msg">⚠️ Не удалось загрузить данные.</div>`;
      const retryBtn = document.createElement('button');
      retryBtn.className = 'retry-btn';
      retryBtn.textContent = '🔄 Повторить попытку';
      retryBtn.addEventListener('click', () => loadData());
      errorDiv.appendChild(retryBtn);
      gridContainer.innerHTML = '';
    };
    document.body.appendChild(script);
  }

  let debounceTimer;
  searchInput.addEventListener('input', (e) => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      searchQuery = e.target.value.trim();
      applyFiltersAndSearch();
    }, 300);
  });

  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.getAttribute('data-filter');
      applyFiltersAndSearch();
    });
  });

  refreshBtn.addEventListener('click', () => loadData(true));

  const header = document.getElementById('siteHeader');
  window.addEventListener('scroll', () => {
    header.classList.toggle('scrolled', window.scrollY > 50);
  });

  document.addEventListener('DOMContentLoaded', () => loadData());
</script>
</body>
</html>
